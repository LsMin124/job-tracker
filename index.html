<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채용 관제 보드</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F4F3; --surface:#FFFFFF; --ink:#1D2321; --muted:#6B7370;
  --line:#DEE2E0; --accent:#C97A1A; --accent-dk:#A96510;
  --ok:#2E7D4F; --bad:#B3452F; --idle:#8A9290;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;
  border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
h1 .sub{font-size:12px;font-weight:500;color:var(--muted);margin-left:10px;letter-spacing:0}
.counters{display:flex;gap:14px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.counters b{color:var(--ink);font-weight:600}
.counters .warn b{color:var(--accent-dk)}

/* toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;
  padding:4px 12px;font-size:12.5px;cursor:pointer;font-family:var(--sans);transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--muted)}
.chip.on{border-color:var(--ink);color:var(--ink);font-weight:600}
.spacer{flex:1}
.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:6px;padding:6px 14px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.btn:hover{background:#000}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--ink)}

/* card */
.list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;display:flex;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 10px rgba(29,35,33,.07)}
.lamp{width:6px;flex:none}
.lamp.idle{background:var(--idle)} .lamp.run{background:var(--accent)}
.lamp.ok{background:var(--ok)} .lamp.bad{background:var(--bad)}
.card-body{flex:1;padding:14px 16px;min-width:0}
.row1{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.tier{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:1px 6px;flex:none}
.prio{font-family:var(--mono);font-size:11px;border:1px solid var(--line);border-radius:4px;padding:1px 6px;flex:none;color:var(--muted)}
.prio.pr1{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.prio.pr2{border-color:var(--accent-dk);color:var(--accent-dk);font-weight:600}
.company{font-weight:700;font-size:15px}
.org{color:var(--muted);font-size:12.5px}
.dday{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent-dk);flex:none}
.dday.over{color:var(--bad)}
.role{margin-top:4px;font-size:13.5px}
.meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12px;color:var(--muted);align-items:center}
.fam{color:var(--ink);background:var(--bg);border-radius:4px;padding:1px 8px;font-size:11.5px;font-weight:600}
.meta a{color:var(--accent-dk);text-decoration:none;font-weight:600}
.meta a:hover{text-decoration:underline}
.note{margin-top:8px;font-size:12.5px;color:var(--muted);background:var(--bg);border-radius:6px;padding:6px 10px;white-space:pre-wrap}

/* stage line — signature */
.stages{margin-top:12px;display:flex;align-items:center;gap:0;max-width:420px}
.seg{flex:1;display:flex;flex-direction:column;gap:4px;position:relative}
.bar{height:4px;background:var(--line);border-radius:2px;margin-right:4px;transition:background .25s}
.seg:last-child .bar{margin-right:0}
.seg.fill .bar{background:var(--accent)}
.seg.fill-ok .bar{background:var(--ok)}
.seg.fill-bad .bar{background:var(--bad)}
.seg small{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.02em}
.seg.fill small,.seg.fill-ok small,.seg.fill-bad small{color:var(--ink);font-weight:600}

/* card controls */
.ctrl{display:flex;flex-direction:column;gap:6px;justify-content:center;padding:12px;border-left:1px solid var(--line);flex:none;width:150px}
.ctrl select{width:100%;border:1px solid var(--line);border-radius:6px;padding:5px 6px;font-family:var(--sans);font-size:12.5px;background:var(--surface);color:var(--ink)}
.mini{display:flex;gap:6px}
.mini button{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:6px;padding:4px 0;font-size:12px;cursor:pointer;color:var(--muted);font-family:var(--sans)}
.mini button:hover{border-color:var(--ink);color:var(--ink)}

.empty{padding:48px 20px;text-align:center;color:var(--muted);font-size:13.5px;border:1px dashed var(--line);border-radius:10px;margin-top:16px}

/* my profile panel */
.profile{margin-top:16px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
.profile summary{cursor:pointer;padding:12px 16px;font-weight:700;font-size:13.5px;list-style:none;display:flex;align-items:baseline;gap:10px}
.profile summary::-webkit-details-marker{display:none}
.profile summary::before{content:'▸';font-size:11px;color:var(--muted);transition:transform .15s}
.profile[open] summary::before{transform:rotate(90deg)}
.profile summary .sub2{font-size:11.5px;font-weight:500;color:var(--muted)}
.profile-body{padding:0 16px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.asset{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px}
.asset b{display:block;font-size:12.5px;margin-bottom:2px}
.asset .tag{font-family:var(--mono);font-size:10px;color:var(--accent-dk);margin-right:6px}
.asset span{color:var(--muted)}

/* detail section (JD · fit · evidence) */
.detail-toggle{margin-top:10px;border:none;background:none;color:var(--accent-dk);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);padding:0}
.detail-toggle:hover{text-decoration:underline}
.detail{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.detail.open{display:block}
.detail h4{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.05em;margin-bottom:5px;font-weight:600}
.detail h4:not(:first-child){margin-top:10px}
.jdlist{list-style:none;font-size:12.5px}
.jdlist li{padding:2px 0 2px 14px;position:relative}
.jdlist li::before{content:'·';position:absolute;left:2px;color:var(--accent)}
.fitrow{display:flex;gap:8px;font-size:12.5px;padding:3px 0;align-items:baseline}
.fitrow .req{flex:1;min-width:0}
.fitrow .arrow{color:var(--accent-dk);font-family:var(--mono);font-size:11px;flex:none}
.fitrow .my{flex:1;min-width:0;color:var(--ok);font-weight:600}
.evlinks{display:flex;flex-wrap:wrap;gap:6px}
.evlinks a{border:1px solid var(--line);border-radius:999px;padding:2px 10px;font-size:11.5px;color:var(--accent-dk);text-decoration:none;font-weight:600}
.evlinks a:hover{border-color:var(--accent-dk)}
.nodata{font-size:12px;color:var(--muted);font-style:italic}

/* live postings (자동 수집) */
.live{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.livechip{display:inline-flex;align-items:baseline;gap:6px;border:1px solid var(--accent);border-radius:6px;
  padding:3px 10px;font-size:12px;color:var(--accent-dk);text-decoration:none;font-weight:600;background:var(--surface)}
.livechip:hover{background:#FBF3E8}
.livechip .end{font-family:var(--mono);font-size:10.5px;color:var(--muted);font-weight:500}
.livechip.hit{background:var(--accent);color:#fff}
.livechip.hit .end{color:rgba(255,255,255,.85)}
.livechip.hit:hover{background:var(--accent-dk)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(29,35,33,.4);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:10}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:520px;padding:22px}
.modal h2{font-size:16px;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-family:var(--sans);font-size:13.5px;color:var(--ink);background:var(--surface)}
.field textarea{min-height:70px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:8px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:20}
.toast.show{opacity:1}

footer{margin-top:36px;font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
footer button{border:none;background:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:11.5px;font-family:var(--sans)}
footer button:hover{color:var(--bad)}

@media (max-width:640px){
  .card{flex-direction:column}
  .lamp{width:100%;height:5px}
  .ctrl{width:100%;border-left:none;border-top:1px solid var(--line);flex-direction:row;align-items:center}
  .ctrl select{flex:1}
  .mini{flex:none;width:110px}
  .dday{margin-left:0}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>채용 관제 보드<span class="sub">로봇 · 생산 SW 신입 포지션</span></h1>
    <div class="counters" id="counters"></div>
  </header>

  <div class="toolbar">
    <div class="chips" id="famChips"></div>
    <div class="chips" id="stChips"></div>
    <div class="spacer"></div>
    <button class="btn" id="addBtn">공고 추가</button>
  </div>

  <details class="profile" id="profile">
    <summary>이력 요약<span class="sub2">프로젝트 · 논문 · 교육 · 자격 — 카드 매칭의 참조 기준</span></summary>
    <div class="profile-body" id="profileBody"></div>
  </details>

  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none">이 필터에 해당하는 공고가 없습니다. 필터를 바꾸거나 「공고 추가」로 새 공고를 등록하세요.</div>

  <footer>
    <span id="savedAt"></span>
    <button id="resetBtn">초기 목록으로 되돌리기</button>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">공고 추가</h2>
    <div class="grid2">
      <div class="field"><label>기업</label><input id="f_company" placeholder="예: 삼성전자 DX"></div>
      <div class="field"><label>조직/부문</label><input id="f_org" placeholder="예: 생산기술연구소"></div>
    </div>
    <div class="field"><label>직무</label><input id="f_role" placeholder="예: 제조 소프트웨어"></div>
    <div class="grid2">
      <div class="field"><label>직무군</label>
        <select id="f_family">
          <option>로봇SW</option><option>제조·설비SW</option><option>생산기술SW형</option><option>안전판</option>
        </select>
      </div>
      <div class="field"><label>구분 / 규모</label>
        <div style="display:flex;gap:6px">
          <select id="f_tier" style="flex:1"><option>1군</option><option>2군</option></select>
          <select id="f_size" style="flex:1"><option>대기업</option><option>중견</option><option>중소</option><option>기타</option></select>
        </div>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>우선순위</label>
        <select id="f_priority">
          <option value="1">1 (최우선)</option><option value="2">2</option>
          <option value="3" selected>3 (기본)</option><option value="4">4</option>
          <option value="5">5 (보류)</option>
        </select>
      </div>
      <div class="field"><label>마감일 (알면 입력)</label><input id="f_deadline" type="date"></div>
    </div>
    <div class="field"><label>채용 사이클 메모</label><input id="f_cycle" placeholder="예: 9월 공채 예상"></div>
    <div class="field"><label>JD 핵심 요약 (한 줄에 하나)</label><textarea id="f_jd" placeholder="예: ROS2 기반 로봇 SW 개발&#10;예: C++/Python, 시뮬레이션 우대"></textarea></div>
    <div class="field"><label>이력 매칭 (요건 :: 내 근거, 한 줄에 하나)</label><textarea id="f_fit" placeholder="예: 로봇 제어 SW :: ROS2 자율주행 대회 동상"></textarea></div>
    <div class="field"><label>근거 링크 (라벨 :: URL, 한 줄에 하나)</label><textarea id="f_links" placeholder="예: 26상 공고 :: https://jasoseol.com/recruit/102920"></textarea></div>
    <div class="field"><label>메모</label><textarea id="f_note" placeholder="자소서 강조점, 준비할 것 등"></textarea></div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">취소</button>
      <button class="btn" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='jobtracker:v2';
const OLDKEY='jobtracker:v1';
const SEED_VER=2; // 시드에 기업 추가 시 +1 — 기존 사용자에게 신규 카드 자동 병합
const STATUSES=['예정','서류작성','지원완료','코테·인적성','면접','최종합격','탈락','관망'];
const STAGES=['지원전','서류','시험','면접','결과'];
const stageIdx={'예정':0,'관망':0,'서류작성':1,'지원완료':1,'코테·인적성':2,'면접':3,'최종합격':4,'탈락':4};
const FAMS=['전체','로봇SW','제조·설비SW','생산기술SW형','안전판'];
const STFILTERS=['전체','진행중','예정·관망','종료'];

const PROFILE=[
 {tag:'ROS2',name:'자율주행 SW 경진대회 동상',desc:'ROS2 실시간 주행 제어 알고리즘 설계·구현 (2024, 성균관대)'},
 {tag:'VISION',name:'6D Pose Estimation 연구',desc:'검은 물체 6DoF 자세추정 — KROC 논문 (RISE Lab 학부연구)'},
 {tag:'ROBOT',name:'화재 탐지·진압 로봇 (졸업작품)',desc:'CCTV 화재 인식 → 발화지점 추정 → 주행·진압 통합 시스템'},
 {tag:'BACKEND',name:'근기능 측정 시스템',desc:'로드셀 HW + 웹·DB 서버 통합 — ICCE 논문 (Smart Biomedical Lab)'},

 {tag:'EDU',name:'SSAFY · 우테코 프리코스',desc:'삼성 SW 아카데미 + Java 구현 트레이닝'},
 {tag:'BASE',name:'기계공학 4.0/4.5 · 정보처리기사 · OPIc IH',desc:'기구학·동역학 기반 + IT 자격 + 영어'},
];

const SEED=[
 {tier:'1군',company:'삼성전자 DX',org:'생산기술연구소',role:'제조 소프트웨어 · 인공지능',family:'제조·설비SW',cycle:'9월 3급 공채 예상 (GSAT)',deadline:'',status:'예정',
  note:'트윈+코파일럿 프로젝트 정조준. 25하 공고로 직무 실증.',
  jd:['생산기술연구소_제조 소프트웨어 / 인공지능 — 25하 모집 실증 (25상은 SW개발 단일 직무)','제조 현장 SW·AI 적용: 스마트팩토리, 디지털트윈, 데이터 기반 공정 최적화','GSAT + SW역량테스트 관문, 이공계 전공'],
  fit:[{req:'제조 시스템·서버 구축',my:'근기능 측정 시스템 — HW+웹·DB 서버 통합 (ICCE)'},{req:'AI·비전 모델 적용',my:'6D Pose 연구 (KROC) · 화재 인식 비전'},{req:'삼성 SW 역량 검증',my:'SSAFY + 정보처리기사'}],
  links:[{label:'삼성커리어스 (공식)',url:'https://www.samsungcareers.com/'},{label:'자소설 기업 페이지',url:'https://jasoseol.com/companies/14665/careers'}]},
 {tier:'1군',company:'삼성전자 DX',org:'미래로봇추진단',role:'시스템 소프트웨어',family:'로봇SW',cycle:'9월 3급 공채 예상 (26상 신설 직무)',deadline:'',status:'예정',
  note:'하반기 재모집 여부 최우선 확인.',
  jd:['[미래로봇추진단] 시스템 소프트웨어 — 26상 공고 직무목록에서 모집 확인 (2026-07 검증)','로봇 시스템·제어 SW: C/C++, 리눅스/RTOS, 로봇 미들웨어 계열','기구학·동역학 이해 우대 — 기계공학 출신 유리, GSAT 관문'],
  fit:[{req:'로봇 제어·시스템 SW',my:'ROS2 자율주행 대회 동상 — 실시간 주행 제어'},{req:'로봇 인식·비전',my:'6D Pose Estimation 연구 (KROC 논문)'},{req:'기구학·동역학 기반',my:'기계공학 본전공 4.0/4.5'}],

const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1800)}

async function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){
      const d=JSON.parse(raw);items=d.items||[];
      if((d.seedVer||1)<SEED_VER){
        SEED.filter(s=>!items.some(o=>o.company===s.company&&o.role===s.role))
            .forEach(s=>items.push({id:uid(),...s}));
        await persist(false);
      }
      return;
    }
    const old=localStorage.getItem(OLDKEY);
    if(old){
      // v1 → v2: 사용자의 상태/메모 수정은 유지하고, 시드에서 JD·매칭·근거를 이식
      const oldItems=(JSON.parse(old).items)||[];
      items=oldItems.map(o=>{
        const s=SEED.find(x=>x.company===o.company&&x.role===o.role);
        const base=s?{jd:s.jd,fit:s.fit,links:s.links}:{jd:[],fit:[],links:o.link?[{label:'공고',url:o.link}]:[]};
        return {...base,...o};
      });
      SEED.filter(s=>!oldItems.some(o=>o.company===s.company&&o.role===s.role))
          .forEach(s=>items.push({id:uid(),...s}));
      localStorage.removeItem(OLDKEY);
      await persist(false);
      return;
    }
  }catch(e){
    memoryOnly=true;toast('저장소 미지원 환경 — 이번 세션에만 유지됩니다');
  }
  items=SEED.map(s=>({id:uid(),...s}));
  await persist(false);
}
async function loadLive(){
  try{
    const r=await fetch('data/postings.json?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const d=await r.json();
    live.updated=d.updated||'';
    live.discovered=d.discovered||[];
    const all=(d.postings||[]).concat(live.discovered);
    live.count=all.length;
    live.byCompany={};
    all.forEach(p=>{(live.byCompany[p.company]=live.byCompany[p.company]||[]).push(p)});
  }catch(e){/* file:// 실행 또는 수집 데이터 없음 — 자동 수집 표시 생략 */}
}

async function persist(show=true){
  if(memoryOnly){render();return}
  try{
    localStorage.setItem(KEY,JSON.stringify({items,seedVer:SEED_VER,updatedAt:new Date().toISOString()}));
    if(show)toast('저장됨');
  }catch(e){toast('저장 실패 — 브라우저 저장소를 확인하세요')}
  render();
}

function lampClass(st){if(st==='최종합격')return'ok';if(st==='탈락')return'bad';if(st==='예정'||st==='관망')return'idle';return'run'}
function stGroup(st){if(st==='최종합격'||st==='탈락')return'종료';if(st==='예정'||st==='관망')return'예정·관망';return'진행중'}
function dday(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const dl=new Date(d+'T00:00:00');const n=Math.round((dl-t)/86400000);return n}

function chips(el,arr,cur,onSel){
  el.innerHTML='';
  arr.forEach(v=>{
    const b=document.createElement('button');b.className='chip'+(v===cur?' on':'');b.textContent=v;
    b.onclick=()=>onSel(v);el.appendChild(b);
  });
}

function render(){
  // 기본값 보정 (기존 저장 데이터 포함): 우선순위 1군=2·2군=3, 규모는 대기업
  items.forEach(it=>{
    if(it.priority==null)it.priority=it.tier==='1군'?2:3;
    if(it.size==null)it.size='대기업';
  });
  chips($('famChips'),FAMS,famFilter,v=>{famFilter=v;render()});
  chips($('stChips'),STFILTERS,stFilter,v=>{stFilter=v;render()});

  const total=items.length;
  const run=items.filter(i=>stGroup(i.status)==='진행중').length;
  const applied=items.filter(i=>['지원완료','코테·인적성','면접','최종합격'].includes(i.status)).length;
  const soon=items.filter(i=>{const n=dday(i.deadline);return n!==null&&n>=0&&n<=7}).length;
  $('counters').innerHTML=`<span>전체 <b>${total}</b></span><span>진행중 <b>${run}</b></span><span>지원완료 <b>${applied}</b></span><span class="warn">마감 7일내 <b>${soon}</b></span><span class="warn">접수중 공고 <b>${live.count}</b></span>`;

  let view=items.filter(i=>(famFilter==='전체'||i.family===famFilter)&&(stFilter==='전체'||stGroup(i.status)===stFilter));
  const liveEnd=it=>{
    const lp=live.byCompany[it.company]||[];
    if(!lp.length)return null;
    return Math.min(...lp.map(p=>{const n=dday(p.end);return n===null?9999:n}));
  };
  const sizeRank=it=>{
    const s=it.size||'';
    if(s.includes('대기업'))return 0;
    if(s.includes('중견'))return 1;
    if(s.includes('중소'))return 2;
    return 3;
  };
  view.sort((a,b)=>{
    // 1순위: 현재 접수중 여부
    const la=liveEnd(a),lb=liveEnd(b);
    if((la!==null)!==(lb!==null))return la!==null?-1:1;
    // 2순위: 기업규모 (대기업 → 중견 → 중소 → 기타)
    const sa=sizeRank(a),sb=sizeRank(b);
    if(sa!==sb)return sa-sb;
    // 3순위: 사용자 지정 우선순위 (1=최우선)
    const pa=a.priority??3,pb=b.priority??3;
    if(pa!==pb)return pa-pb;
    // 4순위: 접수중 마감 임박 순
    if(la!==null&&lb!==null&&la!==lb)return la-lb;
    // 5순위: 수동 입력 마감일 → 구분 → 기업명
    const da=dday(a.deadline),db=dday(b.deadline);
    if(da!==null&&db!==null)return da-db;
    if(da!==null)return -1;if(db!==null)return 1;
    if(a.tier!==b.tier)return a.tier<b.tier?-1:1;
    return a.company.localeCompare(b.company,'ko');
  });

  const list=$('list');list.innerHTML='';
  $('empty').style.display=view.length?'none':'block';

  view.forEach(it=>{
    const idx=stageIdx[it.status]??0;
    const segs=STAGES.map((s,i)=>{
      let cls='seg';
      if(i<=idx&&!(idx===0&&(it.status==='예정'||it.status==='관망'))){
        cls+=it.status==='최종합격'?' fill-ok':it.status==='탈락'?(i===idx?' fill-bad':' fill'):' fill';
      }
      return `<div class="${cls}"><div class="bar"></div><small>${s}</small></div>`;
    }).join('');
    const n=dday(it.deadline);
    const dd=n===null?'':(n<0?`<span class="dday over">마감</span>`:`<span class="dday">D-${n===0?'DAY':n}</span>`);
    const links=it.links||[];
    const link=links[0]?`<a href="${escapeHtml(links[0].url)}" target="_blank" rel="noopener">${escapeHtml(links[0].label)} ↗</a>`:'';
    const note=it.note?`<div class="note">${escapeHtml(it.note)}</div>`:'';
    const jdHtml=(it.jd&&it.jd.length)?`<ul class="jdlist">${it.jd.map(j=>`<li>${escapeHtml(j)}</li>`).join('')}</ul>`:'<div class="nodata">JD 요약 없음 — 「수정」에서 추가</div>';
    const fitHtml=(it.fit&&it.fit.length)?it.fit.map(f=>`<div class="fitrow"><span class="req">${escapeHtml(f.req)}</span><span class="arrow">←</span><span class="my">${escapeHtml(f.my)}</span></div>`).join(''):'<div class="nodata">매칭 항목 없음</div>';
    const evHtml=links.length?`<div class="evlinks">${links.map(l=>`<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label)} ↗</a>`).join('')}</div>`:'<div class="nodata">근거 링크 없음</div>';
    const lp=live.byCompany[it.company]||[];
    const liveHtml=lp.length?`<div class="live">${lp.map(p=>{
      const ln=dday(p.end);
      const dtxt=ln===null?'':(ln<0?'마감':(ln===0?'D-DAY':'D-'+ln));
      return `<a class="livechip${p.hit?' hit':''}" href="${escapeHtml(p.url)}" target="_blank" rel="noopener">접수중 · ${escapeHtml(p.title)}<span class="end">~${escapeHtml((p.end||'').slice(5))} ${dtxt}</span></a>`;
    }).join('')}</div>`:'';
    const isOpen=openSet.has(it.id);
    const detail=`
        <button class="detail-toggle" data-id="${it.id}">${isOpen?'▾':'▸'} JD·매칭·근거 <span style="color:var(--muted);font-weight:500">(요건 ${it.jd?it.jd.length:0} · 매칭 ${it.fit?it.fit.length:0} · 링크 ${links.length})</span></button>
        <div class="detail${isOpen?' open':''}">
          <h4>JD 핵심 (요약)</h4>${jdHtml}
          <h4>요건 ← 내 근거</h4>${fitHtml}
          <h4>근거 링크</h4>${evHtml}
        </div>`;
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="lamp ${lampClass(it.status)}"></div>
      <div class="card-body">
        <div class="row1">
          <span class="tier">${it.tier} · ${escapeHtml(it.size||'기타')}</span>
          <span class="prio pr${it.priority}">P${it.priority}</span>
          <span class="company">${escapeHtml(it.company)}</span>
          <span class="org">${escapeHtml(it.org)}</span>
          ${dd}
        </div>
        <div class="role">${escapeHtml(it.role)}</div>
        <div class="meta"><span class="fam">${it.family}</span><span>${escapeHtml(it.cycle||'')}</span>${link}</div>
        <div class="stages">${segs}</div>
        ${liveHtml}
        ${note}
        ${detail}
      </div>
      <div class="ctrl">
        <select data-id="${it.id}" class="stSel" aria-label="상태 변경">
          ${STATUSES.map(s=>`<option${s===it.status?' selected':''}>${s}</option>`).join('')}
        </select>
        <div class="mini">
          <button data-id="${it.id}" class="editB">수정</button>
          <button data-id="${it.id}" class="delB">삭제</button>
        </div>
      </div>`;
    list.appendChild(card);
  });

  list.querySelectorAll('.stSel').forEach(s=>s.onchange=async e=>{
    const it=items.find(x=>x.id===e.target.dataset.id);if(!it)return;
    it.status=e.target.value;await persist();
  });
  list.querySelectorAll('.detail-toggle').forEach(b=>b.onclick=()=>{
    const id=b.dataset.id;
    if(openSet.has(id))openSet.delete(id);else openSet.add(id);
    const d=b.nextElementSibling;d.classList.toggle('open');
    b.firstChild.textContent=(openSet.has(id)?'▾':'▸')+' JD·매칭·근거 ';
  });
  list.querySelectorAll('.editB').forEach(b=>b.onclick=()=>openModal(b.dataset.id));
  list.querySelectorAll('.delB').forEach(b=>b.onclick=async()=>{
    const it=items.find(x=>x.id===b.dataset.id);
    if(it&&confirm(`「${it.company} — ${it.role}」 항목을 삭제할까요?`)){
      items=items.filter(x=>x.id!==b.dataset.id);await persist();
    }
  });
  const liveInfo=live.updated?` · 공고 자동 수집: ${live.updated.slice(0,16).replace('T',' ')} 기준 ${live.count}건`:'';
  $('savedAt').textContent=(memoryOnly?'임시 모드 (세션 종료 시 소실)':'변경사항은 자동 저장됩니다')+liveInfo;
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function openModal(id){
  editingId=id||null;
  $('modalTitle').textContent=id?'공고 수정':'공고 추가';
  const it=id?items.find(x=>x.id===id):null;
  $('f_company').value=it?it.company:''; $('f_org').value=it?it.org:'';
  $('f_role').value=it?it.role:''; $('f_family').value=it?it.family:'로봇SW';
  $('f_tier').value=it?it.tier:'1군'; $('f_cycle').value=it?it.cycle:'';
  $('f_size').value=(it&&it.size)?(['대기업','중견','중소','기타'].find(s=>String(it.size).includes(s))||'기타'):'대기업';
  $('f_priority').value=String(it&&it.priority?it.priority:3);
  $('f_deadline').value=it?it.deadline:'';
  $('f_jd').value=(it&&it.jd)?it.jd.join('\n'):'';
  $('f_fit').value=(it&&it.fit)?it.fit.map(f=>`${f.req} :: ${f.my}`).join('\n'):'';
  $('f_links').value=(it&&it.links)?it.links.map(l=>`${l.label} :: ${l.url}`).join('\n'):'';
  $('f_note').value=it?it.note:'';
  $('overlay').classList.add('show');
}
function closeModal(){$('overlay').classList.remove('show');editingId=null}

$('addBtn').onclick=()=>openModal(null);
$('cancelBtn').onclick=closeModal;
$('overlay').onclick=e=>{if(e.target===$('overlay'))closeModal()};
const parseLines=t=>t.split('\n').map(s=>s.trim()).filter(Boolean);
$('saveBtn').onclick=async()=>{
  const company=$('f_company').value.trim();
  if(!company){toast('기업명을 입력하세요');return}
  const jd=parseLines($('f_jd').value);
  const fit=parseLines($('f_fit').value).map(l=>{
    const i=l.indexOf('::');
    return i<0?{req:l,my:''}:{req:l.slice(0,i).trim(),my:l.slice(i+2).trim()};
  }).filter(f=>f.req);
  const links=parseLines($('f_links').value).map(l=>{
    const i=l.indexOf('::');
    return i<0?{label:'링크',url:l}:{label:l.slice(0,i).trim()||'링크',url:l.slice(i+2).trim()};
  }).filter(l=>l.url);
  const data={company,org:$('f_org').value.trim(),role:$('f_role').value.trim(),
    family:$('f_family').value,tier:$('f_tier').value,size:$('f_size').value,cycle:$('f_cycle').value.trim(),
    priority:Number($('f_priority').value)||3,
    deadline:$('f_deadline').value,jd,fit,links,note:$('f_note').value.trim()};
  if(editingId){const it=items.find(x=>x.id===editingId);Object.assign(it,data)}
  else items.push({id:uid(),status:'예정',...data});
  closeModal();await persist();
};
$('resetBtn').onclick=async()=>{
  if(confirm('모든 변경사항을 버리고 초기 목록(26건)으로 되돌릴까요?')){
    items=SEED.map(s=>({id:uid(),...s}));await persist();toast('초기 목록 복원됨');
  }
};

function renderProfile(){
  $('profileBody').innerHTML=PROFILE.map(p=>
    `<div class="asset"><b><span class="tag">${escapeHtml(p.tag)}</span>${escapeHtml(p.name)}</b><span>${escapeHtml(p.desc)}</span></div>`
  ).join('');
}

async function registerDiscovered(){
  // 전역 탐색으로 발견된 기업을 등록 기업과 동일한 카드로 자동 등록
  let added=0;
  live.discovered.forEach(p=>{
    if(items.some(i=>i.company===p.company))return;
    const kw=p.kw||[];
    const family=kw.some(k=>k==='로봇'||k==='로보틱스'||k==='자율주행')?'로봇SW'
      :kw.includes('생산기술')?'생산기술SW형'
      :kw.includes('스마트팩토리')?'제조·설비SW':'안전판';
    const links=[{label:'접수중 공고',url:p.url}];
    if(p.cg)links.push({label:'자소설 기업 페이지',url:'https://jasoseol.com/companies/'+p.cg+'/careers'});
    items.push({id:uid(),tier:'2군',priority:4,size:p.size||'기타',company:p.company,
      org:'자동 등록',role:(p.jobs&&p.jobs.length?p.jobs.slice(0,2).join(' · '):p.title),
      family,cycle:'전역 탐색 자동 등록',deadline:p.end||'',status:'예정',
      jd:(p.jobs||[]).slice(0,6),fit:[],links,
      note:'전역 탐색으로 자동 등록됨'+(live.updated?` (${live.updated.slice(0,10)})`:'')});
    added++;
  });
  if(added)await persist(false);
}

Promise.all([load(),loadLive()]).then(async()=>{await registerDiscovered();renderProfile();render()});
</script>
</body>
</html>
